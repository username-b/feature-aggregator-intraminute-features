#cloud-config
package_update: false

write_files:
  - path: /opt/feature-jobs/job.env
    owner: root:root
    permissions: "0600"
    content: |
      AWS_ACCESS_KEY_ID=REPLACE_ME
      AWS_SECRET_ACCESS_KEY=REPLACE_ME
      AWS_DEFAULT_REGION=ru-central1
      S3_ENDPOINT_URL=https://storage.yandexcloud.net
      S3_BUCKET=REPLACE_ME
      RAW_PREFIX=raw
      FEATURES_PREFIX=features
      SYMBOL=ADAUSDT
      INTERVAL=1m
      FEATURE_DATASET_NAME=intraminute_features
      SKIP_EXISTING=true
      # START_DATE=2020-02-01
      # END_DATE=2026-02-01

  - path: /opt/feature-jobs/run-job.sh
    owner: root:root
    permissions: "0750"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      IMAGE="registry.example/intraminute-features:v0.1.0"
      docker pull "${IMAGE}"
      docker run --rm --env-file /opt/feature-jobs/job.env "${IMAGE}"

runcmd:
  - [ bash, -lc, "/opt/feature-jobs/run-job.sh" ]
